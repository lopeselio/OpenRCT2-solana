[toolchain]
package_manager = "yarn"
sbf_tools_version = "v1.52"

[features]
resolution = true
skip-lint = false

[programs.localnet]
solana_city = "2ce1z7iFfMB6BHzaWvT5jqhsDsS6jeEjvymGYwrb8wDn"

[programs.devnet]
solana_city = "2ce1z7iFfMB6BHzaWvT5jqhsDsS6jeEjvymGYwrb8wDn"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 \"tests/solana-city.ts\""
test-er = "yarn run ts-mocha -p ./tsconfig.json -t 180000 \"tests/solana-city-er.ts\""
